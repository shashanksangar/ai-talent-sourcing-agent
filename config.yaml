# Configuration for AI Talent Sourcing Agent

# AI Evaluation Configuration (Claude via Vertex AI)
ai_evaluation:
  enabled: true
  model: claude-sonnet-4-5
  temperature: 0.5
  max_tokens: 2000
  use_vertex_ai: true
  timeout: 60

# Sourcing parameters
platforms:
  - linkedin
  - github
  - arxiv

keywords:
  - "machine learning"
  - "deep learning"
  - "computer vision"
  - "AI research"

# Filtering criteria
min_experience_years: 3
required_skills:
  - python
  - pytorch
  - tensorflow

# Output settings
output_format: json
database_path: data/candidates.db

# Scheduling
daily_scan_enabled: true
scan_interval_hours: 24